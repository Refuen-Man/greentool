appId: com.greenparrot.toolbox
productName: 绿鹦鹉工具箱
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
asar: true
asarUnpack:
  - "out/renderer/assets/pdf.worker*.mjs"
win:
  target:
    - target: nsis
      arch:
        - x64
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.utilities
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
