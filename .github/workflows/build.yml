name: Build & Package

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          node -e "try{require('fs').unlinkSync('.npmrc')}catch(e){}"
          node -e "try{require('fs').unlinkSync('package-lock.json')}catch(e){}"
          npm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download LibreOffice (Excel→PDF)
        run: |
          $url = "https://download.documentfoundation.org/libreoffice/portable/26.2.1/LibreOfficePortable_26.2.1_MultilingualStandard.paf.exe"
          $out = "$env:RUNNER_TEMP\lo.paf.exe"
          Write-Host "Downloading LibreOffice Portable..."
          Invoke-WebRequest -Uri $url -OutFile $out -TimeoutSec 600
          Write-Host "Extracting with 7-Zip..."
          & "C:\Program Files\7-Zip\7z.exe" x $out -o"resources\libreoffice" -y
          Remove-Item $out
          Write-Host "Verifying..."
          if (Test-Path "resources\libreoffice\App\libreoffice\program\soffice.exe") {
            Write-Host "LibreOffice OK"
          } else {
            Write-Host "soffice.exe not found, checking contents..."
            Get-ChildItem resources\libreoffice -Recurse -Depth 2 | ForEach-Object { $_.FullName }
            throw "LibreOffice extraction failed"
          }
        shell: pwsh
        timeout-minutes: 20

      - run: npm run build

      - name: Package (NSIS installer)
        run: npm exec electron-builder -- --win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: gpt-Windows
          path: dist/*.exe
          if-no-files-found: error

  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          rm -f .npmrc package-lock.json
          npm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle LibreOffice (Excel→PDF)
        run: |
          set -e
          echo "Installing LibreOffice via Homebrew..."
          brew install --cask libreoffice
          mkdir -p resources/libreoffice
          echo "Copying LibreOffice.app..."
          cp -R /Applications/LibreOffice.app resources/libreoffice/
          echo "Verifying..."
          if [ -f "resources/libreoffice/LibreOffice.app/Contents/MacOS/soffice" ]; then
            echo "LibreOffice OK"
          else
            ls -la resources/libreoffice/
            echo "ERROR: soffice not found"
            exit 1
          fi
        timeout-minutes: 20

      - run: npm run build

      - name: Package (DMG x64 + arm64)
        run: npm exec electron-builder -- --mac
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_FOR_PULL_REQUEST: true

      - uses: actions/upload-artifact@v4
        with:
          name: gpt-macOS
          path: dist/*.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-mac]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          generate_release_notes: true
