name: Build & Package

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Remove China mirror config for CI
        run: node -e "try{require('fs').unlinkSync('.npmrc')}catch(e){}"

      - run: npm ci

      - name: Build & Package (Windows)
        run: npm run package:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: 绿鹦鹉工具箱-Windows
          path: dist/*.exe
          if-no-files-found: error

  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Remove China mirror config for CI
        run: node -e "try{require('fs').unlinkSync('.npmrc')}catch(e){}"

      - run: npm ci

      - name: Build & Package (macOS x64 + arm64)
        run: npm run package:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_FOR_PULL_REQUEST: true

      - uses: actions/upload-artifact@v4
        with:
          name: 绿鹦鹉工具箱-macOS
          path: dist/*.dmg
          if-no-files-found: error
